version: "3.9"

services:
  postgres:
    image: postgres:16-alpine
    container_name: blog-postgres
    restart: unless-stopped
    ports:
      - "5432:5432"
    environment:
      POSTGRES_USER: blog
      POSTGRES_PASSWORD: blog123
      POSTGRES_DB: blog_db
    volumes:
      - pgdata:/var/lib/postgresql/data

volumes:
  pgdata:
